name: Repro

# Triggered by commenting `/repro` on a GitHub issue.
# Spins up the Flue repro-agent (automations/repro-agent), which scaffolds a
# minimal Agents/Worker reproduction, deploys it to a temporary Cloudflare
# preview account with `wrangler deploy --temporary`, verifies the bug, and
# comments the findings back on the issue.

on:
  issue_comment:
    types: [created]

jobs:
  # Gate: only members/owners/collaborators, only on issues (not PRs), and only
  # when the comment is the exact `/repro` command. The coarse `contains()` in
  # the job `if` avoids spinning a runner for unrelated comments; the parse step
  # does an exact, word-boundary match so substrings like `/reprocess` or a
  # `/repro` inside a URL do not trigger a run.
  parse:
    if: >-
      github.event.issue.pull_request == null &&
      github.event.sender.type != 'Bot' &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
      contains(github.event.comment.body, '/repro')
    runs-on: ubuntu-latest
    outputs:
      match: ${{ steps.check.outputs.match }}
    steps:
      - name: Exact command match
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if printf '%s' "$COMMENT_BODY" | grep -qiE '(^|[[:space:]])/repro([[:space:]]|$)'; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

  reproduce:
    needs: parse
    if: needs.parse.outputs.match == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    steps:
      - name: Acknowledge command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
            --body "🤖 repro-agent is on it — building and deploying a reproduction for this issue. This takes a few minutes."

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Install repro-agent dependencies
        working-directory: automations/repro-agent
        run: npm install

      - name: Run repro-agent
        working-directory: automations/repro-agent
        env:
          # Inference: Pi/Flue calls OpenAI directly. This stays in the parent
          # process and is NOT forwarded into the agent's sandbox shell.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Forwarded into the sandbox so the agent can read the issue and
          # post its findings. Note: this is the GH token, NOT a Cloudflare
          # token — so `wrangler deploy --temporary` stays unauthenticated.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Passed via env (not interpolated into the command line) so a
          # crafted repo/issue value cannot inject shell — the JSON is built
          # with jq from these variables.
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          INPUT="$(jq -cn --argjson issueNumber "$ISSUE_NUMBER" --arg repo "$REPO" \
            '{issueNumber: $issueNumber, repo: $repo}')"
          npx flue run reproduce --target node --input "$INPUT"
