name: MCP Conformance

on:
  pull_request:
    paths:
      - "packages/agents/**"
      - ".github/workflows/conformance.yml"
  push:
    branches:
      - main
    paths:
      - "packages/agents/**"
      - ".github/workflows/conformance.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  client-conformance:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install
      - run: pnpm --filter agents run test:conformance:client:stateless

  client-compatibility:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - 2025-11-25
          - 2025-06-18
          - 2025-03-26
          - extensions
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install
      - run: pnpm --filter agents run test:conformance:client:${{ matrix.variant }}

  server-conformance:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - mcp-agent
          - handler
          - handler:legacy-compat
          - handler:legacy
          - handler:extensions
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install
      - run: pnpm --filter agents run test:conformance:server:${{ matrix.variant }}
