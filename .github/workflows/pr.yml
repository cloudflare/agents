name: PR Agent

# Triggered by commenting `/pr` on a GitHub issue.
# Runs the Flue pr-agent (automations/pr-agent), which reads the issue and all
# its comments (including any repro-agent findings) and attempts to one-shot a
# fix PR: branch, change, test, push, and open the PR linked to the issue.
# The fix commit is attributed to the user who ran `/pr`.

on:
  issue_comment:
    types: [created]

jobs:
  # Gate: only members/owners/collaborators, only on issues (not PRs), and only
  # when the comment *starts with* the `/pr` command. The coarse `contains()`
  # in the job `if` avoids spinning a runner for unrelated comments; the parse
  # step requires the command at the start (so `/probably`, `/preview`, or a
  # file path like `.github/workflows/pr.yml` do not trigger) and captures any
  # text after the command as extra context for the agent.
  parse:
    if: >-
      github.event.issue.pull_request == null &&
      github.event.sender.type != 'Bot' &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
      contains(github.event.comment.body, '/pr')
    runs-on: ubuntu-latest
    outputs:
      match: ${{ steps.check.outputs.match }}
      context: ${{ steps.check.outputs.context }}
    steps:
      - name: Parse command and context
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # The comment must START WITH `/pr` (optionally indented). Anything
          # after the command — on the first line and any following lines — is
          # captured as free-form context and passed to the agent.
          if printf '%s' "$COMMENT_BODY" | head -n1 | grep -qiE '^[[:space:]]*/pr([[:space:]]|$)'; then
            echo "match=true" >> "$GITHUB_OUTPUT"
            CONTEXT="$(printf '%s' "$COMMENT_BODY" | sed -E '1s@^[[:space:]]*/pr[[:space:]]*@@I')"
            {
              echo "context<<__PI_EOF__"
              printf '%s\n' "$CONTEXT"
              echo "__PI_EOF__"
            } >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

  pr:
    needs: parse
    if: needs.parse.outputs.match == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Acknowledge with 👀 reaction
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api --method POST \
            "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -f content=eyes

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install pr-agent dependencies
        working-directory: automations/pr-agent
        run: npm install

      - name: Run pr-agent
        working-directory: automations/pr-agent
        env:
          # Inference via Cloudflare AI Gateway (same secrets as Bonk). Stay in
          # the parent process; not forwarded into the agent sandbox shell.
          CLOUDFLARE_API_KEY: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CF_AI_GATEWAY_NAME }}
          # Forwarded into the sandbox: read issue, push branch, open PR.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Passed via env (not interpolated into the command line) so crafted
          # values cannot inject shell; the JSON input is built with jq.
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          ACTOR_LOGIN: ${{ github.event.comment.user.login }}
          ACTOR_ID: ${{ github.event.comment.user.id }}
          CONTEXT: ${{ needs.parse.outputs.context }}
        run: |
          INPUT="$(jq -cn \
            --argjson issueNumber "$ISSUE_NUMBER" \
            --arg repo "$REPO" \
            --arg actorLogin "$ACTOR_LOGIN" \
            --argjson actorId "$ACTOR_ID" \
            --arg context "$CONTEXT" \
            '{issueNumber: $issueNumber, repo: $repo, actorLogin: $actorLogin, actorId: $actorId, context: $context}')"
          npx flue run pr --target node --input "$INPUT"

      - name: React 🚀 on success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api --method POST \
            "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -f content=rocket

      - name: React 😕 on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api --method POST \
            "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -f content=confused
