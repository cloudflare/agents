name: Triage

# Runs automatically on every newly opened issue. The Flue triage-agent
# (automations/triage-agent) reads the issue and applies fitting labels from
# the repo's EXISTING label set only. It cannot create labels or comment.
#
# Unlike the `/repro` and `/pr` command workflows, triage is intentionally NOT
# gated to org members: it runs on every issue (including community reports) so
# they get labeled. It is low-risk — it can only add existing labels, cannot
# comment, and has no pull-requests scope.

on:
  issues:
    types: [opened]

jobs:
  triage:
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}
      cancel-in-progress: true
    # Deliberately minimal: read the repo (for checkout) and label issues.
    # No pull-requests scope, and the agent is instructed not to comment or
    # create labels.
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Install triage-agent dependencies
        working-directory: automations/triage-agent
        run: npm install

      - name: Run triage-agent
        working-directory: automations/triage-agent
        env:
          # Inference: Pi/Flue calls OpenAI directly.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Scoped to issue labeling only.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Passed via env (not interpolated into the command line); JSON built with jq.
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          INPUT="$(jq -cn --argjson issueNumber "$ISSUE_NUMBER" --arg repo "$REPO" \
            '{issueNumber: $issueNumber, repo: $repo}')"
          npx flue run triage --target node --input "$INPUT"
