name: Install
description: Set up Vite+, Node, and install dependencies.

inputs:
  registry-url:
    description: Registry URL for setup-node (set this when publishing).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
      with:
        node-version: 24
        registry-url: ${{ inputs.registry-url }}
        cache: true
        run-install: |
          - args: ['--frozen-lockfile']
